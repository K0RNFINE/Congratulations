<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>กราฟหนุมาร</title>

<style>
body {
    margin: 0;
    background: #111;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    flex-direction: column;
    font-family: sans-serif;
    color: white;
}
canvas {
    background: #1e1e1e;
    border: 2px solid white;
}
</style>
</head>
<body>

<h2>กราฟพลังหนุมาร</h2>
<canvas id="hanumanGraph" width="600" height="400"></canvas>

<script>
const canvas = document.getElementById("hanumanGraph");
const ctx = canvas.getContext("2d");

const width = canvas.width;
const height = canvas.height;

const data = [20, 60, 40, 80, 30, 90, 70, 100];

// วาดแกน
ctx.strokeStyle = "white";
ctx.lineWidth = 2;
ctx.beginPath();
ctx.moveTo(50, 20);
ctx.lineTo(50, height - 50);
ctx.lineTo(width - 20, height - 50);
ctx.stroke();

// ===== วาดเส้นกราฟ =====
ctx.strokeStyle = "lime";
ctx.lineWidth = 3;
ctx.beginPath();

for (let i = 0; i < data.length; i++) {
    let x = 50 + i * 70;
    let y = height - 50 - data[i] * 3;

    if (i === 0) {
        ctx.moveTo(x, y);
    } else {
        ctx.lineTo(x, y);
    }
}

ctx.stroke(); // ต้อง stroke ก่อนจะวาดจุด

// ===== วาดจุด =====
for (let i = 0; i < data.length; i++) {
    let x = 50 + i * 70;
    let y = height - 50 - data[i] * 3;

    ctx.fillStyle = "red";
    ctx.beginPath();
    ctx.arc(x, y, 5, 0, Math.PI * 2);
    ctx.fill();
}

</script>

</body>
</html>
